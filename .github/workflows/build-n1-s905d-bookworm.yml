name: Build N1 s905d Armbian Bookworm from official image

on:
  workflow_dispatch:
    inputs:
      armbian_url:
        description: "Official Armbian Odroid N2 Bookworm image URL, .img.xz"
        required: true
        type: string
      armbian_kernel:
        description: "Kernel series for N1/s905d"
        required: true
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.6.y
          - 6.1.y
          - 5.15.y
      auto_kernel:
        description: "Auto use latest kernel in selected series"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build N1 s905d image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo timedatectl set-timezone "${TZ}"
          mkdir -p build/output/images

      - name: Rebuild Armbian for Phicomm N1 s905d
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: armbian
          armbian_path: ${{ inputs.armbian_url }}
          armbian_board: s905d
          armbian_kernel: ${{ inputs.armbian_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ophub/kernel
          kernel_usage: stable
          armbian_fstype: ext4
          armbian_size: 512/2560
          builder_name: wylcloud

      - name: Upload image artifact
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: n1-s905d-armbian-bookworm
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*
          if-no-files-found: error
